allOf:
  - $ref: './base-field-config.yaml'
  - type: object
    description: Textarea field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [textarea]
        description: Field type discriminant
      max_length:
        type: integer
        description: Maximum length of the input string
      rtl:
        type: boolean
        description: Whether to enable right-to-left text direction
      rich_text:
        type: boolean
        description: Whether rich text is enabled
      markdown:
        type: boolean
        description: Whether markdown is enabled
