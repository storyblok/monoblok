name: CI

on:
  push:
    branches:
      - main
      - next
      - alpha
      - beta
      - rc
      - "*-v[0-9]" # mantainance branches (IMPORTANT: naming must be <pkg>-vX (i.e.: react-sdk-v3, richtext-v5, etc)
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches:
      - main
      - next
      - alpha
      - beta
      - rc
      - "*-v[0-9]"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

env:
  HUSKY: 0
  NX_REJECT_UNKNOWN_LOCAL_CACHE: 0

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.name }})
    environment: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            # `tag:npm:public` is inferred from publishability; `tag:scope:ci` opts
            # in private packages (e.g. tooling, integration tests) that still need CI.
            projects: "tag:npm:public,tag:scope:ci"
          - os: windows-latest
            name: windows
            projects: storyblok
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Check
        run: pnpm nx run-many --target=build,lint,test,test:types --parallel=3 -p="${{ matrix.projects }}"
        env:
          VITE_ACCESS_TOKEN: ${{ secrets.VITE_ACCESS_TOKEN }}
          VITE_SPACE_ID: ${{ vars.VITE_SPACE_ID }}

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Check Licenses
        run: pnpm nx exec -p="tag:npm:public" -- pnpm -w monoblok license check \$NX_PROJECT_NAME
