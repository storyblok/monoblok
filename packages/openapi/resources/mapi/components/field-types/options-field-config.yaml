allOf:
  - $ref: './base-field-config.yaml'
  - type: object
    description: Options (multi-select) field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [options]
        description: Field type discriminant
      options:
        type: array
        description: Array of selectable options
        items:
          type: object
          properties:
            _uid:
              type: string
            name:
              type: string
            value:
              type: string
      source:
        type: string
        description: Source of the options (undefined=self, internal_stories, internal_languages, external, internal)
      datasource_slug:
        type: string
        description: Datasource slug when source is internal
      external_datasource:
        type: string
        description: External datasource JSON URL when source is external
      folder_slug:
        type: string
        description: Path of allowed stories folder when source is internal_stories
      filter_content_type:
        type: array
        description: Allowed content type blocks when source is internal_stories
        items:
          type: string
      use_uuid:
        type: boolean
        description: Whether to use UUID for the option values
      is_reference_type:
        type: boolean
        description: Whether this Multi-Options field is a References field
      entry_appearance:
        type: string
        description: Display appearance (link or card) when source is internal_stories
      allow_advanced_search:
        type: boolean
        description: Whether to allow advanced search in a modal when source is internal_stories
      max_options:
        type: string
        description: Maximum number of selectable options
      min_options:
        type: string
        description: Minimum number of selectable options
      multiple:
        type: boolean
        description: Whether multiple values are allowed
