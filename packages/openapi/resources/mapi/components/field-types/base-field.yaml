type: object
description: Shared base properties for all field type configurations
properties:
  type:
    type: string
    description: Field type discriminant
  id:
    type: string
    description: The ID of the field
  display_name:
    type: string
    description: Human-readable display name
  description:
    type: string
    description: Field description displayed in the editor
  tooltip:
    type: boolean
    description: Whether to display the description as a tooltip
  translatable:
    type: boolean
    description: Whether the field is translatable
  required:
    type: boolean
    description: Whether the field is required
  regex:
    type: string
    description: Regular expression for validation
  default_value:
    type: string
    description: Default value for the field (can be escaped JSON)
  pos:
    type: integer
    description: Position of the field within the block
  no_translate:
    type: boolean
    description: Exclude the field from translation exports
  conditional_settings:
    type: array
    description: Conditions set on the field for conditional visibility
    items:
      type: object
  exclude_from_ai_translation:
    type: boolean
    description: Exclude the field from AI translations
  exclude_from_merge:
    type: boolean
    description: Exclude the field when merging (Dimensions App)
  exclude_from_overwrite:
    type: boolean
    description: Exclude the field when overwriting (Dimensions App)
  force_merge:
    type: boolean
    description: Overwrite the field when merging (Dimensions App)
