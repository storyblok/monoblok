allOf:
  - $ref: './base-field.yaml'
  - type: object
    description: Multilink field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [multilink]
        description: Field type discriminant
      restrict_content_types:
        type: boolean
        description: Whether to restrict linkable content types
      component_whitelist:
        type: array
        description: List of allowed content type blocks for internal links
        items:
          type: string
      allow_target_blank:
        type: boolean
        description: Whether to allow opening links in a new tab
      allow_custom_attributes:
        type: boolean
        description: Whether to allow setting custom link attributes
      force_link_scope:
        type: boolean
        description: Whether to restrict to a specific folder
      link_scope:
        type: string
        description: Path of the allowed folder when force_link_scope is true
      show_anchor:
        type: boolean
        description: Whether to allow defining an anchor ID for internal links
      email_link_type:
        type: boolean
        description: Whether to allow specifying an email address
      asset_link_type:
        type: boolean
        description: Whether to allow specifying an asset URL
