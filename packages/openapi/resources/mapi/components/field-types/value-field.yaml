type: object
description: |
  Properties shared by content-bearing fields (i.e. fields that hold a value).
  Layout-only field types like `section` and `tab` do not include these.
properties:
  required:
    type: boolean
    description: Whether the field is required
  regex:
    type: string
    description: Regular expression for validation
  default_value:
    type: string
    description: Default value for the field (can be escaped JSON)
  translatable:
    type: boolean
    description: Whether the field is translatable
  no_translate:
    type: boolean
    description: Exclude the field from translation exports
  exclude_from_ai_translation:
    type: boolean
    description: Exclude the field from AI translations
  exclude_from_merge:
    type: boolean
    description: Exclude the field when merging (Dimensions App)
  exclude_from_overwrite:
    type: boolean
    description: Exclude the field when overwriting (Dimensions App)
  force_merge:
    type: boolean
    description: Overwrite the field when merging (Dimensions App)
