allOf:
  - $ref: ./base-field.yaml
  - $ref: ./value-field.yaml
  - type: object
    description: Rich text field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [richtext]
        description: Field type discriminant
      customize_toolbar:
        type: boolean
        description: Whether to allow toolbar customization
      toolbar:
        type: array
        description: Array of enabled toolbar elements
        items:
          type: string
          enum:
            - ai-complete
            - ai-shorten
            - ai-extend
            - ai-rephrase
            - ai-summarize
            - ai-simplify
            - ai-tone
            - ai-emoji
            - ai-translate
            - ai-tldr
            - ai-spelling
            - blok
            - ltr
            - rtl
            - export
            - import
            - bold
            - list
            - inlinecode
            - code
            - color
            - copy
            - cut
            - emoji
            - h1
            - h2
            - h3
            - h4
            - h5
            - h6
            - highlight
            - unset
            - hrule
            - image
            - italic
            - link
            - anchor
            - olist
            - paragraph
            - paste-action
            - paste
            - quote
            - redo
            - strike
            - subscript
            - superscript
            - underline
            - undo
            - align-left
            - align-center
            - align-right
            - align-justify
      style_options:
        type: array
        description: Custom CSS styles for the rich text field
        items:
          type: object
          properties:
            _uid:
              type: string
            name:
              type: string
            value:
              type: string
      restrict_type:
        type: string
        description: Restriction type for component selection (groups, tags, or empty for specific blocks)
      restrict_components:
        type: boolean
        description: Whether to restrict which components can be inserted
      component_whitelist:
        type: array
        description: List of allowed component names
        items:
          type: string
      component_denylist:
        type: array
        description: List of denied component names
        items:
          type: string
      component_tag_whitelist:
        type: array
        description: List of allowed tag IDs for component filtering
        items:
          type: integer
      component_tag_denylist:
        type: array
        description: List of denied tag IDs for component filtering
        items:
          type: integer
      component_group_whitelist:
        type: array
        description: List of allowed component group UUIDs
        items:
          type: string
      component_group_denylist:
        type: array
        description: List of denied component group UUIDs
        items:
          type: string
      allow_target_blank:
        type: boolean
        description: Whether to allow links to open in a new tab
      allow_custom_attributes:
        type: boolean
        description: Whether to allow custom link attributes
