openapi: 3.1.1
info:
  title: Storyblok Components API
  version: 1.0.0
  description: API for managing Storyblok components
servers:
  $ref: ../shared/servers.yaml
security:
  $ref: ../shared/security.yaml
paths:
  /v1/spaces/{space_id}/components:
    description: A component is a standalone entity that is meaningful in its own right. While components (or bloks) can be nested in each other, semantically they remain equal. Each component is a small piece of your data structure which can be filled with content. One component can consist of as many field types as required. The components endpoint allows you to retrieve, add, update, or delete components.
    get:
      operationId: list
      summary: Retrieve Multiple Components
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/pagination.yaml#/page
        - $ref: ../shared/pagination.yaml#/per_page
        - name: by_ids
          in: query
          required: false
          schema:
            type: string
          description: Filter by ids (comma separated)
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          description: Components can be sorted in an ascending or descending order by a specific property
        - name: is_root
          in: query
          required: false
          schema:
            type: boolean
          description: Retrieve all the components based on is_root property of a component
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name or display_name
        - name: in_group
          in: query
          required: false
          schema:
            type: string
          description: Find components that are present in a specific group with the UUID of the group
        - name: with_tags
          in: query
          required: false
          schema:
            type: string
          description: Filter components by tags
        - name: by_metadata_app_slug
          in: query
          required: false
          schema:
            type: string
          description: Filter components by metadata app slug
        - name: by_metadata_frame_id
          in: query
          required: false
          schema:
            type: string
          description: Filter components by metadata frame ID
      responses:
        "200":
          description: List of components
          content:
            application/json:
              schema:
                type: object
                properties:
                  components:
                    type: array
                    items:
                      $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Space not found
    post:
      operationId: create
      summary: Create a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  $ref: "#/components/schemas/ComponentCreate"
      responses:
        "201":
          description: Component created
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Space not found
  /v1/spaces/{space_id}/components/{component_id}:
    description: Manage a specific component by its ID. Retrieve, update, or delete individual components and their configurations.
    get:
      operationId: get
      summary: Retrieve One Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        "200":
          description: Component details
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component not found
    put:
      operationId: update
      summary: Update a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  $ref: "#/components/schemas/ComponentUpdate"
                update_content:
                  type: boolean
                  description: Update component name in stories when component name changes
      responses:
        "200":
          description: Component updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component not found
    delete:
      operationId: delete
      summary: Delete a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        "200":
          description: Component deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component not found
  /v1/spaces/{space_id}/components/{component_id}/restore:
    post:
      operationId: restore
      summary: Restore Component
      description: Restore a component from its last version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        "200":
          description: Component restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component not found
  /v1/spaces/{space_id}/versions:
    description: Retrieve component versions. This endpoint's response is paginated.
    get:
      operationId: versions
      summary: Retrieve Component Versions
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number
        - $ref: ../shared/pagination.yaml#/per_page
        - name: model
          in: query
          required: false
          schema:
            type: string
            enum: [components, stories]
          description: Model type. Must be 'components' for component versions.
        - name: model_id
          in: query
          required: false
          schema:
            type: string
          description: Component ID when model is 'components'
        - name: versions_v2
          in: query
          required: false
          schema:
            type: boolean
          description: Use version 2 system for retrieving versions

      responses:
        "200":
          description: Component versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        event:
                          type: string
                        created_at:
                          type: string
                        author_id:
                          type: integer
                        item_id:
                          type: integer
                        author:
                          type: string
                        is_draft:
                          type: boolean

        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component not found
  /v1/spaces/{space_id}/components/{component_id}/component_versions/{version_id}:
    description: Retrieve schema details of a component version.
    get:
      operationId: version
      summary: Retrieve a Single Component Version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
        - name: version_id
          in: path
          required: true
          schema:
            type: integer
          description: Version ID of the component
      responses:
        "200":
          description: Component version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  component_version:
                    type: object
                    properties:
                      schema:
                        type: object
                        additionalProperties: true
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component or version not found
  /v1/spaces/{space_id}/versions/{version_id}:
    description: Restore a component to a saved version.
    put:
      operationId: restoreVersion
      summary: Restore a Component Version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - name: version_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the component version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                model_id:
                  type: string
      responses:
        "200":
          description: Component version restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: "#/components/schemas/Component"
        "400":
          $ref: ../../shared/responses.yaml#/BadRequest
        "401":
          $ref: ../../shared/responses.yaml#/Unauthorized
        "404":
          description: Component or version not found
components:
  securitySchemes:
    $ref: ../shared/security-schemes.yaml#/securitySchemes
  schemas:
    Component:
      $ref: component.yaml
    ComponentVersion:
      type: object
      description: A component version object
      properties:
        schema:
          additionalProperties: true
    ComponentSchemaField:
      type: object
      description: A component schema field object
      properties:
        type:
          type: string
          description: Field type (text, textarea, number, boolean, etc.)
        pos:
          type: integer
          description: Position of the field
        display_name:
          type: string
          description: Human-readable display name
        required:
          type: boolean
          description: Whether the field is required
        regex:
          type: string
          description: Regular expression for validation
        translatable:
          type: boolean
          description: Whether the field is translatable
        description:
          type: string
          description: Field description
        default_value:
          type: string
          description: Default value for the field
        options:
          type: array
          description: Array of datasource entries [{name:"", value:""}]; Effects editor only if source=undefined. For field type option.
          items:
            type: object
            properties:
              _uid:
                type: string
              name:
                type: string
              value:
                type: string

        source:
          type: string
          description: The source of Single-Option and Multi-Options fields
          enum: [internal_stories, internal_languages, external, internal]
        folder_slug:
          type: string
          description: When the source is set to internal_stories, set the path of the allowed stories folder
        filetypes:
          type: array
          description: Allowed file types for Asset and Multi-Assets fields (e.g. images, videos, audios, texts)
          items:
            type: string
        maximum:
          type: number
          description: The maximal number of components allowed inside a Blocks field
        minimum:
          type: number
          description: The minimal number of components allowed inside a Blocks field
        maxlength:
          type: integer
          description: Maximum length for text fields
        minlength:
          type: integer
          description: Minimum length for text fields
        rich_markdown:
          type: boolean
          description: Whether rich markdown is enabled
        rich_text:
          type: boolean
          description: Whether rich text is enabled
        markdown:
          type: boolean
          description: Whether markdown is enabled
        size:
          type: string
          description: Field size (small, medium, large)
        height:
          type: integer
          description: Field height in pixels
        width:
          type: integer
          description: Field width in pixels
        use_uuid:
          type: boolean
          description: When the source is set to internal_stories, displays the UUID of the selected story. Defaults to true.
        restrict_content_types:
          type: boolean
          description: Whether to restrict content types
        restrict_components:
          type: boolean
          description: Allow or deny access to nestable blocks inside Blocks and Richtext fields. Defaults to false (allowed).
        restrict_type:
          type: string
          description: Specify which blocks are allowed or not inside Blocks and Richtext fields. Supported types are groups (blocks in specific folders), tags (blocks assigned to specific tags), or "" for specific blocks (components).
          enum: [groups, tags, ""]
        component_whitelist:
          type: array
          description: An array of nestable or universal type block names allowed inside Blocks, Link, and Richtext fields
          items:
            type: string
        component_denylist:
          type: array
          description: An array of block names not allowed inside Blocks, Link, and Richtext fields
          items:
            type: string
        component_group_whitelist:
          type: array
          description: An array of group (folder) UUIDs that contain blocks allowed inside Blocks and Richtext fields
          items:
            type: string
        component_group_denylist:
          type: array
          description: An array of group (folder) UUIDs that contain blocks not allowed inside Blocks and Richtext fields
          items:
            type: string
        component_tag_whitelist:
          type: array
          description: An array of tag IDs assigned to blocks allowed inside Blocks and Richtext fields
          items:
            type: integer
        component_tag_denylist:
          type: array
          description: An array of tag IDs assigned to blocks not allowed inside Blocks and Richtext fields
          items:
            type: integer
        maximum_entries:
          type: integer
          description: Maximum number of entries
        minimum_entries:
          type: integer
          description: Minimum number of entries
        restrict_assets:
          type: boolean
          description: Whether to restrict assets
        asset_whitelist:
          type: array
          description: List of allowed asset types
          items:
            type: string
        asset_folder_id:
          type: number
          description: Numeric ID of the asset folder allowed in Asset and Multi-Assets fields
        allow_external_url:
          type: boolean
          description: Allow loading assets from an external URL in Asset and Multi-Assets fields. Defaults to false.
        exclude_empty_option:
          type: boolean
          description: Whether to exclude empty option
        include_empty_option:
          type: boolean
          description: Whether to include empty option
        datasource_slug:
          type: string
          description: When the source is set to internal (Datasource), the selectable datasource slug
        external_datasource:
          type: string
          description: When the source is set to external, the datasource JSON URL
        filter_content_type:
          type: array
          description: When the source is set to internal_stories, allow users to select stories from an array of permitted content type blocks
          items:
            type: string
        entry_appearance:
          type: string
          description: When the source is set to internal_stories, specify if the option appears as a link (default) or a card
        allow_advanced_search:
          type: boolean
          description: When the source is set to internal_stories, allow users to search stories in a modal window. Defaults to false.
        is_reference_type:
          type: boolean
          description: Set to true if the Multi-Options field is a References field
        max_options:
          type: string
          description: The maximal number of selectable options in Single-Option, Multi-Options, and References fields
        min_options:
          type: string
          description: The minimal number of selectable options in Single-Option, Multi-Options, and References fields
        multiple:
          type: boolean
          description: Whether multiple values are allowed
        email_link_type:
          type: boolean
          description: Allow specifying an email address in a Link field. Defaults to false.
        asset_link_type:
          type: boolean
          description: Allow specifying an asset's URL in a Link field. Defaults to false.
        show_anchor:
          type: boolean
          description: When the URL in a Link field is an Internal link, allow users to define an anchor ID. Defaults to false.
        allow_target_blank:
          type: boolean
          description: Allow links to open in a new tab. Defaults to false.
        allow_custom_attributes:
          type: boolean
          description: Allow setting custom attributes in a Link field. Defaults to false.
        force_link_scope:
          type: boolean
          description: When the URL in a Link field is an Internal link, allow users to only select stories from a specific folder. Defaults to false.
        link_scope:
          type: string
          description: When force_link_scope is set to true, specify the allowed path
        no_translate:
          type: boolean
          description: Exclude Text and number fields from translation exports
        rtl:
          type: boolean
          description: Enable global right-to-left (RTL) support in Markdown, Text, and Textarea fields
        tooltip:
          type: boolean
          description: Set to true to display the description as a tooltip. Defaults to false.
        id:
          type: string
          description: The ID of the field
        max_length:
          type: number
          description: Set the maximum length of the input string in Markdown, Text, and Textarea fields
        style_options:
          type: array
          description: Objects containing data about custom CSS set inside the Richtext field
          items:
            type: object
            properties:
              _uid:
                type: string
                description: The unique ID of the style within the story
              name:
                type: string
                description: The style's name
              value:
                type: string
                description: The style's value
        customize_toolbar:
          type: boolean
          description: Set to true to enable a customized toolbar in Markdown and Richtext fields. Defaults to false.
        toolbar:
          type: array
          description: An array of enabled toolbar elements
          items:
            type: string
        allow_multiline:
          type: boolean
          description: Allow empty paragraphs in Markdown fields. Defaults to false.
        min_value:
          type: number
          description: The minimal value allowed in a Number field
        max_value:
          type: number
          description: The maximal value allowed in a Number field
        decimals:
          type: number
          description: The number of decimal places that appear after the point in a Number field
        steps:
          type: number
          description: The interval between numbers in a Number field
        disable_time:
          type: boolean
          description: Disable time selection in the date picker of a Date/Time field. Defaults to false.
        inline_label:
          type: boolean
          description: Display a Boolean field's label next to the toggle
        keys:
          type: array
          description: An array of field keys displayed in a Group field
          items:
            type: string
        field_type:
          type: string
          description: The name of the field type plugin used in a Plugin field
        required_fields:
          type: string
          description: A comma-separated list of names of fields the user is required to fill in in a Plugin field
        exclude_from_ai_translation:
          type: boolean
          description: Exclude the field from AI translations
        exclude_from_merge:
          type: boolean
          description: Exclude the field when merging
        exclude_from_overwrite:
          type: boolean
          description: Exclude the field when overwriting
        force_merge:
          type: boolean
          description: Overwrite the field when merging
        conditional_settings:
          type: array
          description: An array that contains an object with information about conditions set on the field
          items:
            type: object
        custom_css:
          type: string
          description: Custom CSS for the field
        custom_js:
          type: string
          description: Custom JavaScript for the field
        api_connection:
          type: object
          description: API connection configuration
          properties:
            url:
              type: string
              description: API URL
            headers:
              type: object
              description: API headers
            params:
              type: object
              description: API parameters
        fieldset:
          type: object
          description: Fieldset configuration
          properties:
            title:
              type: string
              description: Fieldset title
            description:
              type: string
              description: Fieldset description
            collapsible:
              type: boolean
              description: Whether the fieldset is collapsible
            collapsed:
              type: boolean
              description: Whether the fieldset is collapsed by default
    ComponentCreate:
      $ref: ./component-create.yaml
    ComponentUpdate:
      $ref: ./component-update.yaml
