allOf:
  - $ref: ./base-field.yaml
  - $ref: ./value-field.yaml
  - type: object
    description: Custom (field plugin) field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [custom]
        description: Field type discriminant
      field_type:
        type: string
        description: Technical name of the field plugin
      options:
        type: array
        description: Plugin-specific options
        items:
          type: object
          properties:
            name:
              type: string
            value:
              type: string
      required_fields:
        type: string
        description: Comma-separated list of required field names in the plugin
      source:
        type: string
        description: Source for plugin-provided options (`self` or `internal` for datasource)
        enum: [self, internal]
      datasource_slug:
        type: string
        description: Slug of the internal datasource when `source` is `internal`
      external_datasource:
        type: string
        description: URL to an external datasource when `source` is set accordingly
