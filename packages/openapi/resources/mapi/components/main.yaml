openapi: 3.1.1
info:
  title: Storyblok Components API
  version: 1.0.0
  description: API for managing Storyblok components
servers:
  $ref: ../shared/servers.yaml
security:
  $ref: ../shared/security.yaml
paths:
  /v1/spaces/{space_id}/components:
    description: A component is a standalone entity that is meaningful in its own right. While components (or bloks) can be nested in each other, semantically they remain equal. Each component is a small piece of your data structure which can be filled with content. One component can consist of as many field types as required. The components endpoint allows you to retrieve, add, update, or delete components.
    get:
      operationId: list
      summary: Retrieve Multiple Components
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/pagination.yaml#/page
        - $ref: ../shared/pagination.yaml#/per_page
        - name: by_ids
          in: query
          required: false
          schema:
            type: string
          description: Filter by ids (comma separated)
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          description: Components can be sorted in an ascending or descending order by a specific property
        - name: is_root
          in: query
          required: false
          schema:
            type: boolean
          description: Retrieve all the components based on is_root property of a component
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by name or display_name
        - name: in_group
          in: query
          required: false
          schema:
            type: string
          description: Find components that are present in a specific group with the UUID of the group
        - name: with_tags
          in: query
          required: false
          schema:
            type: string
          description: Filter components by tags
        - name: by_metadata_app_slug
          in: query
          required: false
          schema:
            type: string
          description: Filter components by metadata app slug
        - name: by_metadata_frame_id
          in: query
          required: false
          schema:
            type: string
          description: Filter components by metadata frame ID
      responses:
        '200':
          description: List of components
          content:
            application/json:
              schema:
                type: object
                properties:
                  components:
                    type: array
                    items:
                      $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Space not found
    post:
      operationId: create
      summary: Create a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  $ref: '#/components/schemas/ComponentCreate'
      responses:
        '201':
          description: Component created
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Space not found
  /v1/spaces/{space_id}/components/{component_id}:
    description: Manage a specific component by its ID. Retrieve, update, or delete individual components and their configurations.
    get:
      operationId: get
      summary: Retrieve One Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        '200':
          description: Component details
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component not found
    put:
      operationId: update
      summary: Update a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                component:
                  $ref: '#/components/schemas/ComponentUpdate'
                update_content:
                  type: boolean
                  description: Update component name in stories when component name changes
      responses:
        '200':
          description: Component updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component not found
    delete:
      operationId: delete
      summary: Delete a Component
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        '200':
          description: Component deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component not found
  /v1/spaces/{space_id}/components/{component_id}/restore:
    post:
      operationId: restore
      summary: Restore Component
      description: Restore a component from its last version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
      responses:
        '200':
          description: Component restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component not found
  /v1/spaces/{space_id}/versions:
    description: Retrieve component versions. This endpoint's response is paginated.
    get:
      operationId: versions
      summary: Retrieve Component Versions
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number
        - $ref: ../shared/pagination.yaml#/per_page
        - name: model
          in: query
          required: false
          schema: 
            type: string
            enum: [components, stories]
          description: Model type. Must be 'components' for component versions.
        - name: model_id
          in: query
          required: false
          schema: 
            type: string
          description: Component ID when model is 'components'
        - name: versions_v2
          in: query
          required: false
          schema:
            type: boolean
          description: Use version 2 system for retrieving versions

      responses:
        '200':
          description: Component versions
          content:
            application/json:
              schema: 
                type: object
                properties: 
                  versions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        event:
                          type: string
                        created_at:
                          type: string
                        author_id:
                          type: integer
                        item_id:
                          type: integer
                        author:
                          type: string
                        is_draft:
                          type: boolean
                
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component not found
  /v1/spaces/{space_id}/components/{component_id}/component_versions/{version_id}:
    description: Retrieve schema details of a component version.
    get:
      operationId: version
      summary: Retrieve a Single Component Version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - $ref: ../shared/parameters.yaml#/component_id
        - name: version_id
          in: path
          required: true
          schema:
            type: integer
          description: Version ID of the component
      responses:
        '200':
          description: Component version details
          content:
            application/json:
              schema:
                type: object
                properties:
                  component_version:
                    type: object
                    properties:
                      schema:
                        type: object
                        additionalProperties: true
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component or version not found
  /v1/spaces/{space_id}/versions/{version_id}:
    description: Restore a component to a saved version.
    put:
      operationId: restoreVersion
      summary: Restore a Component Version
      parameters:
        - $ref: ../shared/parameters.yaml#/space_id
        - name: version_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the component version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                model_id:
                  type: string
      responses:
        '200':
          description: Component version restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  component:
                    $ref: '#/components/schemas/Component'
        '400':
          $ref: ../../shared/responses.yaml#/BadRequest
        '401':
          $ref: ../../shared/responses.yaml#/Unauthorized
        '404':
          description: Component or version not found
components:
  securitySchemes:
    $ref: ../shared/security-schemes.yaml#/securitySchemes
  schemas:
    Component:
      $ref: component.yaml
    ComponentVersion:
      type: object
      description: A component version object
      properties:
        schema:
          additionalProperties: true
    ComponentSchemaField:
      description: A component schema field — discriminated union on `type`.
      discriminator:
        propertyName: type
      oneOf:
        - $ref: './field-types/text-field-config.yaml'
        - $ref: './field-types/textarea-field-config.yaml'
        - $ref: './field-types/richtext-field-config.yaml'
        - $ref: './field-types/markdown-field-config.yaml'
        - $ref: './field-types/number-field-config.yaml'
        - $ref: './field-types/datetime-field-config.yaml'
        - $ref: './field-types/boolean-field-config.yaml'
        - $ref: './field-types/option-field-config.yaml'
        - $ref: './field-types/options-field-config.yaml'
        - $ref: './field-types/asset-field-config.yaml'
        - $ref: './field-types/multiasset-field-config.yaml'
        - $ref: './field-types/multilink-field-config.yaml'
        - $ref: './field-types/bloks-field-config.yaml'
        - $ref: './field-types/table-field-config.yaml'
        - $ref: './field-types/section-field-config.yaml'
        - $ref: './field-types/tab-field-config.yaml'
        - $ref: './field-types/custom-field-config.yaml'
    ComponentCreate:
      $ref: ./component-create.yaml
    ComponentUpdate:
      $ref: ./component-update.yaml
