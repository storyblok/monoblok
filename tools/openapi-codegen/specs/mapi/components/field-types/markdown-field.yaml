allOf:
  - $ref: ./base-field.yaml
  - $ref: ./value-field.yaml
  - type: object
    description: Markdown field configuration
    required:
      - type
    properties:
      type:
        type: string
        enum: [markdown]
        description: Field type discriminant
      rich_markdown:
        type: boolean
        description: Whether to display markdown as rich text
      rtl:
        type: boolean
        description: Whether to enable right-to-left text direction
      customize_toolbar:
        type: boolean
        description: Whether to enable a customized toolbar
      toolbar:
        type: array
        description: Array of enabled toolbar elements
        items:
          type: string
          enum:
            - bold
            - italic
            - inlinecode
            - code
            - h1
            - h2
            - h3
            - h4
            - h5
            - h6
            - list
            - olist
            - quote
            - hrule
            - link
            - image
            - paragraph
            - help
            - toggle-richtext
            - auto
            - ltr
            - rtl
      allow_multiline:
        type: boolean
        description: Whether to allow empty paragraphs
      max_length:
        type: integer
        description: Maximum length of the input string
