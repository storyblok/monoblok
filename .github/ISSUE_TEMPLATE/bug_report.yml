name: Bug Report
description: Report a bug in any of the Storyblok SDK packages
title: "[Bug]: "
labels: ["type: bug", "status: triage"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package(s) is this bug related to?
      multiple: true
      options:
        - "@storyblok/react"
        - "@storyblok/vue"
        - "@storyblok/nuxt"
        - "@storyblok/svelte"
        - "@storyblok/astro"
        - "@storyblok/angular"
        - "@storyblok/js"
        - "storyblok-js-client"
        - "@storyblok/richtext"
        - "storyblok (CLI)"
        - "@storyblok/api-client"
        - "@storyblok/management-api-client"
        - "@storyblok/live-preview"
        - "@storyblok/migrations"
        - "Other / Unknown"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Initialize Storyblok with...
        2. Call method...
        3. See error...
    validations:
      required: true

  - type: input
    id: reproduction-url
    attributes:
      label: Reproduction URL
      description: A link to a minimal reproduction (StackBlitz, CodeSandbox, GitHub repo)
      placeholder: "https://stackblitz.com/..."

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please run the following command in your project directory and paste the output:

        ```
        npx envinfo --system --npmPackages '{react,vue,svelte,astro,next,nuxt,@storyblok/*,storyblok}' --binaries --browsers
        ```
      render: shell
      placeholder: Paste the output of the envinfo command here...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: If applicable, add any error messages or logs
      render: shell
      placeholder: Paste any error messages here...

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, related issues, etc.)
      placeholder: Any additional information that might help...
